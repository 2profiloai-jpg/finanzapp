<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#D4AF37" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json?v=2" />
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/aureum/192/192" />
    <title>Aureum | Financial Tracker</title>
  </head>
  <body>
    <div id="root">
      <div style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: black; color: #D4AF37; font-family: sans-serif; text-align: center; padding: 20px;">
        <div style="width: 40px; height: 40px; border: 3px solid #D4AF37; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
        <p style="letter-spacing: 0.2em; font-size: 12px; text-transform: uppercase; opacity: 0.8;">Aureum is loading...</p>
        <div style="margin-top: 40px;">
          <button onclick="resetApp()" style="padding: 10px 20px; background: transparent; border: 1px solid #D4AF37; color: #D4AF37; border-radius: 8px; cursor: pointer; font-size: 11px; opacity: 0.5;">RESET CACHE</button>
        </div>
      </div>
    </div>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script>
      function resetApp() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) {
              registration.unregister();
            }
          });
        }
        localStorage.clear();
        sessionStorage.clear();
        location.reload(true);
      }
      
      // Register Service Worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('SW Registered', reg);
              // Force update check
              reg.update();
            })
            .catch(err => console.error('SW Registration Failed', err));
        });
      }

      // Handle PWA Install Prompt
      window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent Chrome 67 and earlier from automatically showing the prompt
        e.preventDefault();
        // Stash the event so it can be triggered later.
        window.deferredPrompt = e;
        console.log('PWA Install Prompt ready');
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      setTimeout(function() {
        if (!window.__AUREUM_LOADED__) {
          var root = document.getElementById('root');
          if (root && root.innerText.includes('loading...')) {
             root.innerHTML += '<p style="color:red; margin-top: 20px; font-size: 12px;">App failed to initialize. Try clicking "RESET CACHE" above.</p>';
          }
        }
      }, 8000);
    </script>
  </body>
</html>
